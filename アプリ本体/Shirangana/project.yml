name: Shirangana
options:
  bundleIdPrefix: com.shirangana
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "11"
targets:
  Shirangana:
    type: application
    platform: iOS
    sources:
      - path: Shirangana
        excludes:
          - Resources/README.md
    resources:
      - path: Shirangana/Resources
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yoshiakinagumo.shirangana
        DEVELOPMENT_TEAM: UJV34TVHWC
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Shirangana/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_ASSET_PATHS: ""
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_STRICT_CONCURRENCY: minimal
